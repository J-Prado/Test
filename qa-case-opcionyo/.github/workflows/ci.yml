name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------
  # Core suite: Flows A, B, C + Chime (mocked). Must pass to merge.
  # Runs inside the Laravel app mock (app-mock/).
  # ---------------------------------------------------------------------
  tests:
    name: Pest (API + Chime)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-mock
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_sqlite, sqlite3, bcmath, curl, openssl
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: app-mock/vendor
          key: composer-${{ hashFiles('app-mock/composer.lock', 'app-mock/composer.json') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run test suite
        run: php artisan test --exclude-group=integration

  # ---------------------------------------------------------------------
  # E2E: Playwright (qa-case/e2e/) drives the login flow against a real
  # server booted from the app mock (app-mock/).
  # ---------------------------------------------------------------------
  e2e:
    name: Playwright (E2E login)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_sqlite, sqlite3, bcmath, curl, openssl
          coverage: none

      - name: Install PHP dependencies
        working-directory: app-mock
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare environment + database
        working-directory: app-mock
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite
          php artisan migrate --force

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        working-directory: qa-case/e2e
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: qa-case/e2e
        env:
          CI: 'true'
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: qa-case/e2e/playwright-report
          retention-days: 7
